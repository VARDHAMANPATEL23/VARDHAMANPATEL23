<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 900 100" width="900" height="100">
  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#24243e"/>
      <stop offset="50%"  stop-color="#302b63"/>
      <stop offset="100%" stop-color="#0f0c29"/>
    </linearGradient>

    <linearGradient id="hglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="scanpulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="48%"  stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c4b5fd" stop-opacity="0.15"/>
      <stop offset="52%"  stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softblur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>

    <clipPath id="clip">
      <rect width="900" height="100"/>
    </clipPath>

  </defs>

  <!-- Background -->
  <rect width="900" height="100" fill="url(#bg)"/>

  <!-- ── Animated mesh (diagonal scroll, same speed as header) ── -->
  <g clip-path="url(#clip)">

    <!-- Grid scrolling diagonally: bottom-right → top-left (reversed from header for contrast) -->
    <g opacity="0.12">
      <animateTransform
        attributeName="transform"
        type="translate"
        from="50,50"
        to="0,0"
        dur="4s"
        repeatCount="indefinite"/>

      <!-- Horizontal lines -->
      <line x1="-50" y1="-50"  x2="950" y2="-50"  stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="-50" y1="0"    x2="950" y2="0"    stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="-50" y1="50"   x2="950" y2="50"   stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="-50" y1="100"  x2="950" y2="100"  stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="-50" y1="150"  x2="950" y2="150"  stroke="#a78bfa" stroke-width="0.8"/>

      <!-- Vertical lines -->
      <line x1="-50"  y1="-50" x2="-50"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="0"    y1="-50" x2="0"    y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="50"   y1="-50" x2="50"   y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="100"  y1="-50" x2="100"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="150"  y1="-50" x2="150"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="200"  y1="-50" x2="200"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="250"  y1="-50" x2="250"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="300"  y1="-50" x2="300"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="350"  y1="-50" x2="350"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="400"  y1="-50" x2="400"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="450"  y1="-50" x2="450"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="500"  y1="-50" x2="500"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="550"  y1="-50" x2="550"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="600"  y1="-50" x2="600"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="650"  y1="-50" x2="650"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="700"  y1="-50" x2="700"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="750"  y1="-50" x2="750"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="800"  y1="-50" x2="800"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="850"  y1="-50" x2="850"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="900"  y1="-50" x2="900"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
      <line x1="950"  y1="-50" x2="950"  y2="150" stroke="#a78bfa" stroke-width="0.8"/>
    </g>

    <!-- Node dots at intersections -->
    <g opacity="0.2">
      <animateTransform
        attributeName="transform"
        type="translate"
        from="50,50"
        to="0,0"
        dur="4s"
        repeatCount="indefinite"/>
      <circle cx="0"   cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="100" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="200" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="300" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="400" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="500" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="600" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="700" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="800" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="900" cy="0"   r="1.4" fill="#c4b5fd"/>
      <circle cx="0"   cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="100" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="200" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="300" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="400" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="500" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="600" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="700" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="800" cy="100" r="1.4" fill="#c4b5fd"/>
      <circle cx="900" cy="100" r="1.4" fill="#c4b5fd"/>
    </g>

    <!-- Scan pulse sweep: right→left (opposite to header) -->
    <rect x="0" y="0" width="900" height="100" fill="url(#scanpulse)" opacity="0.7">
      <animateTransform
        attributeName="transform"
        type="translate"
        from="1800,0"
        to="-900,0"
        dur="3.5s"
        repeatCount="indefinite"/>
    </rect>

    <!-- Vignette fades -->
    <rect width="80"  height="100" fill="url(#bg)" opacity="0.7"/>
    <rect x="820" width="80" height="100" fill="url(#bg)" opacity="0.7"/>
    <rect width="900" height="35" fill="url(#bg)" opacity="0.55"/>
    <rect y="65"  width="900" height="35" fill="url(#bg)" opacity="0.55"/>
  </g>

  <!-- ── Top glow edge ── -->
  <rect x="40" y="0" width="820" height="1"   fill="url(#hglow)"/>
  <rect x="40" y="1" width="820" height="2"   fill="url(#hglow)" filter="url(#softblur)" opacity="0.5"/>

  <!-- ── Corner brackets ── -->
  <polyline points="0,28 0,0 28,0"       fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <polyline points="872,0 900,0 900,28"  fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <polyline points="0,72 0,100 28,100"   fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>
  <polyline points="872,100 900,100 900,72" fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#glow)"/>

  <!-- Centre top diamond -->
  <polygon points="450,2 456,8 450,14 444,8" fill="#a78bfa" filter="url(#glow)"/>

  <!-- ── Quote text ── -->
  <text x="450" y="56"
        font-family="'Courier New', Courier, monospace"
        font-size="13" font-style="italic" letter-spacing="1"
        fill="#c4b5fd" text-anchor="middle">"The best way to predict the future is to build it."</text>

  <!-- Corner micro-labels -->
  <text x="8"   y="90" font-family="'Courier New',monospace" font-size="8" fill="#a78bfa" opacity="0.5">EOF</text>
  <text x="892" y="90" font-family="'Courier New',monospace" font-size="8" fill="#a78bfa" opacity="0.5" text-anchor="end">github.com/VARDHAMANPATEL23</text>

</svg>
